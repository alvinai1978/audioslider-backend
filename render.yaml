services:
  - type: web
    name: slidenarrate-pro-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: REQUIRE_LICENSE
        value: "true"
      - key: LICENSE_SECRET
        value: "CHANGE_THIS_SECRET_BEFORE_SELLING"
      - key: ALLOWED_ORIGINS
        value: "https://audioslider.infinityfree.io"
