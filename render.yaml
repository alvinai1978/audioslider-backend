services:
  - type: web
    name: slidenarrate-pro-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REQUIRE_LICENSE
        value: "false"
      - key: LICENSE_SECRET
        value: "CHANGE_THIS_SECRET_BEFORE_SELLING"
